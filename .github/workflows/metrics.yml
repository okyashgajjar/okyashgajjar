name: Generate Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General metrics & Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.general.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: okyashgajjar
          base: header, activity, community, repositories, metadata
          plugin_languages: yes

      - name: 3D Commit Calendar & Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: okyashgajjar
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes

      - name: Achievements & Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: okyashgajjar
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_stargazers: yes
          plugin_notable: yes

      # - name: YouTube Music
      #   uses: lowlighter/metrics@latest
      #   with:
      #     filename: metrics.music.svg
      #     token: NOT_NEEDED
      #     base: ""
      #     plugin_music: yes
      #     plugin_music_mode: recent
      #     plugin_music_provider: youtube
      #     plugin_music_token: ${{ secrets.YOUTUBE_MUSIC_TOKENS }}

      - name: Stack Overflow
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.stackoverflow.svg
          token: NOT_NEEDED
          base: ""
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 32567804  # ⚠️ Replace '1' with your StackOverflow User ID
          plugin_stackoverflow_sections: answers-top, questions-recent
          plugin_stackoverflow_limit: 2

      - name: GitHub Skyline
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.skyline.svg
          token: NOT_NEEDED
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: 2024
