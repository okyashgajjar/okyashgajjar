name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: okyashgajjar
          template: classic
          config_timezone: Asia/Kolkata
          config_display: large
          retries: 3
          retries_delay: 300
          base_indepth: yes
          plugin_introduction: yes
          plugin_isocalendar: yes
          plugin_calendar: yes
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: X
          plugin_achievements_secrets: yes
          plugin_notable: yes
          plugin_lines: yes
          plugin_lines_sections: base, repositories, history
          plugin_lines_history_limit: 1
          plugin_stars: yes
          plugin_topics: yes
          plugin_topics_mode: labels
          plugin_topics_limit: 20
          plugin_topics_sort: starred
          plugin_stargazers: yes
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_people: yes
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          plugin_discussions: yes
          plugin_reactions: yes
          plugin_reactions_limit: 400
          plugin_reactions_limit_issues: 200
          plugin_reactions_limit_discussions: 100
          plugin_reactions_limit_discussions_comments: 100
          plugin_reactions_details: count, percentage
          plugin_gists: yes
          plugin_sponsors: yes
          plugin_sponsorships: yes
          plugin_stackoverflow: yes
          plugin_stackoverflow_user: 32567804
